<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDOJ - Online Judge</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: white;
        }

        header {
            background-color: #161b22;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background-color: #161b22;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover {
            background-color: #21262d;
            transform: scale(1.05);
        }

        button {
            padding: 10px 20px;
            background-color: #238636;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #2ea043;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            background-color: #161b22;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    LDOJ - Online Judge
</header>

<div class="container">
    <h1>Chào mừng đến LDOJ 🎉</h1>
    <p>Trang chấm bài miễn phí của tôi đã hoạt động!</p>

    <div class="card">
        <h3>Bài 1: Hello World</h3>
        <p>In ra dòng chữ Hello World</p>
        <button>Xem bài</button>
    </div>

    <div class="card">
        <h3>Bài 2: Tổng hai số</h3>
        <p>Nhập a, b và in ra tổng</p>
        <button>Xem bài</button>
    </div>
</div>

<footer>
    © 2026 LDOJ - Powered by GitHub Pages
</footer>

</body>
</html>
